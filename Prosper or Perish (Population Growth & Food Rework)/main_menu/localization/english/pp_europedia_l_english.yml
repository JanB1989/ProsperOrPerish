# Europedia mod overview - appears under Game Concepts, searchable for "prosper", "perish", "harvest"
ENCYCLOPEDIA_PAGE_PROSPER_OR_PERISH: "Prosper or Perish"
game_concept_prosper_perish_mod: "Prosper or Perish (Mod)"
game_concept_prosper_perish_mod_desc: "In the Europa Universalis timeframe, food was the main limiting factor for slow economic growth. Advances, centralization, and eventually industrialization changed this over time. Urbanization and a productive burgher and laborer class were restrained by food consumption that had to come from the rural countryside. It could not happen overnight. Famine and starvation occurred regularly from war and siege, internal strife, poor harvests, disease, and trade disruption. Food storage security was one of the main factors on the path to modernity. Explore the cards below for Game Rules, New Trade Goods, New Buildings, Variable Harvests, Urbanization, Farm Capacity, Farm Output, Population Distribution, Population Growth, Population Capacity, Infrastructure, Food Production, Starvation, and AI Changes."
game_concept_prosper_or_perish: "Prosper or Perish"
harvest_situation: "Prosper or Perish: Variable Harvests"
harvest_situation_desc: "Variable Harvests simulates the historical variability of agriculture. Harvests are intended to matter most in the early game, when [rgo|e] output and food surpluses are tighter. As [advances|e] and [buildings|e] expand production capacity, the impact of individual harvest years diminishes.\n\nEach year in September, every [region|e] receives a random harvest outcome. Harvests do not directly impact [food|e] production; they affect farmed [goods|e] that are subject to yearly swings. Poor harvests raise prices of those [goods|e], making [pp_victuals|e] and then [food|e] more expensive; bountiful harvests ease the pressure. For how [food|e] prices affect [population_growth|e], [prosperity|e], and [starving|e], see [pp_food|e].\n\n#T Optional Setting:#!\nVariable Harvests can be turned off. When creating a new game, disable the game rule \"Prosper or Perish: Variable Harvests\" if you prefer a steadier food economy.\n\n#T Harvest Levels:#!\nThe system uses multiple harvest tiers. Each tier applies different modifiers to [locations|e] within the region. Click any harvest type for full modifier details:\n\n$BULLET$ [abysmal_harvest|e] — A disastrous harvest that severely reduces output of affected farmed [goods|e].\n$BULLET$ [very_poor_harvest|e] — A poor harvest that significantly reduces output of affected farmed [goods|e].\n$BULLET$ [poor_harvest|e] — A below-average harvest that reduces output of affected farmed [goods|e].\n$BULLET$ [good_harvest|e] — An above-average harvest that boosts output of affected farmed [goods|e].\n$BULLET$ [very_good_harvest|e] — An excellent harvest that significantly boosts output of affected farmed [goods|e].\n$BULLET$ [bountiful_harvest|e] — An exceptional harvest that greatly boosts output of affected farmed [goods|e].\n\n#T Impact by Good:#!\nHarvests affect different food [goods|e] to different degrees. Staples like [ShowGoodsName('fish')] are less subject to yearly swings, while crops such as [ShowGoodsName('wheat')] are more heavily impacted by regional harvest outcomes.\n\n#T The Mapmode:#!\nWhen viewing the Variable Harvests [situation|e], the map shows each [location|e]'s current harvest state. Colors range from dark (failed harvests) to bright (exceptional harvests). [locations|e] where [pops|e] are [starving|e] or where the [market|e] has a negative food balance receive special highlighting to draw attention to food crises."
harvest_situation_monthly: "• Each September, harvests are rolled for every [region|e]\n• Modifiers last one year; affect farmed [goods|e] subject to yearly swings, not [food|e] production directly\n• Impact varies by good: staples like fish less, crops like wheat more\n• Can be turned off via the game rule when creating a new game"
game_concept_abysmal_harvest: "Failed Harvest"
game_concept_abysmal_harvest_desc: "A disastrous harvest that severely reduces output of affected farmed [goods|e].\n\n[ShowModifierEffect('abysmal_harvest_modifier')]"
game_concept_very_poor_harvest: "Bad Harvest"
game_concept_very_poor_harvest_desc: "A poor harvest that significantly reduces output of affected farmed [goods|e].\n\n[ShowModifierEffect('very_poor_harvest_modifier')]"
game_concept_poor_harvest: "Weak Harvest"
game_concept_poor_harvest_desc: "A below-average harvest that reduces output of affected farmed [goods|e].\n\n[ShowModifierEffect('poor_harvest_modifier')]"
game_concept_good_harvest: "Strong Harvest"
game_concept_good_harvest_desc: "An above-average harvest that boosts output of affected farmed [goods|e].\n\n[ShowModifierEffect('good_harvest_modifier')]"
game_concept_very_good_harvest: "Excellent Harvest"
game_concept_very_good_harvest_desc: "An excellent harvest that significantly boosts output of affected farmed [goods|e].\n\n[ShowModifierEffect('very_good_harvest_modifier')]"
game_concept_bountiful_harvest: "Exceptional Harvest"
game_concept_bountiful_harvest_desc: "An exceptional harvest that greatly boosts output of affected farmed [goods|e].\n\n[ShowModifierEffect('bountiful_harvest_modifier')]"
