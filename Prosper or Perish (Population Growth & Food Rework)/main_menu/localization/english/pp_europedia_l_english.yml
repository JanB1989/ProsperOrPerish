# Europedia mod overview - appears under Game Concepts, searchable for "prosper", "perish", "harvest"
game_concept_prosper_perish_mod: "Prosper or Perish (Mod)"
game_concept_prosper_perish_mod_desc: "Prosper or Perish is a mod that deepens the [food|e] and population mechanics in Europa Universalis V. It adds variability to agriculture, rebalances [buildings|e] and [rgo|e] output, and provides additional difficulty options for players seeking a more challenging economic simulation.\n\n#T Variable Harvests:#!\nThe central feature is the [ShowSituationName('harvest_situation')] [situation|e] — the Yearly Harvest Tracker. Each September, every [region|e] in [ShowContinentName('europe')] receives a random harvest outcome that modifies local [food|e] production for the following year. Six harvest tiers are possible:\n\n$BULLET$ [abysmal_harvest|e], [very_poor_harvest|e], [poor_harvest|e] — reduce output\n$BULLET$ [good_harvest|e], [very_good_harvest|e], [bountiful_harvest|e] — boost output\n\nModerate harvests are more likely than extremes. Poor harvests can push [markets|e] into deficit and trigger [starving|e]; bountiful harvests ease food pressure. Variable harvests are most impactful in the early game (first 100–200 years) before [advances|e] and [buildings|e] expand production capacity. The feature can be disabled via the game rule \"Prosper or Perish: Variable Harvests.\"\n\n#T Harder AI:#!\nAn optional game rule \"Prosper or Perish: Harder AI\" reduces food consumption for AI-controlled [pops|e] (except [ShowPopTypeName('peasants')]), making AI nations more resilient to food crises. This does not affect human players.\n\n#T Building & RGO Changes:#!\nThe mod adjusts [buildings|e], [rgo|e] capacity, and food production across the game to support a more granular [food|e] economy. Consult in-game tooltips and the Situations page of the Europedia for the Yearly Harvest Tracker entry."
game_concept_prosper_or_perish: "Prosper or Perish"
harvest_situation: "Yearly Harvest Tracker"
harvest_situation_desc: "Part of the Prosper or Perish mod, the Yearly Harvest Tracker simulates the historical variability of agriculture. Each year in September, every [region|e] on the continent of [ShowContinentName('europe')] receives a random harvest outcome that modifies local food production for the following year. Poor harvests can push [markets|e] into deficit and trigger [starving|e], while bountiful harvests ease the pressure on food supply.\n\n#T Harvest Levels:#!\nThe system uses six harvest tiers. Each tier applies different modifiers to [locations|e] within the region. Click any harvest type for full modifier details:\n\n$BULLET$ [abysmal_harvest|e] (13% chance) — A disastrous harvest that severely reduces food production.\n$BULLET$ [very_poor_harvest|e] (17% chance) — A poor harvest that significantly reduces food production.\n$BULLET$ [poor_harvest|e] (20% chance) — A below-average harvest that reduces food production.\n$BULLET$ [good_harvest|e] (20% chance) — An above-average harvest that boosts food production.\n$BULLET$ [very_good_harvest|e] (17% chance) — An excellent harvest that significantly boosts food production.\n$BULLET$ [bountiful_harvest|e] (13% chance) — An exceptional harvest that greatly boosts food production.\n\n#T The Mapmode:#!\nWhen viewing the Yearly Harvest Tracker [situation|e], the map shows each [location|e]'s current harvest state. Colors range from dark (failed harvests) to bright (exceptional harvests). [locations|e] where [pops|e] are [starving|e] or where the [market|e] has a negative food balance receive special highlighting to draw attention to food crises.\n\n#T Design Notes:#!\nVariable harvests are intended to matter most in the early game (roughly the first 100–200 years), when [rgo|e] output and food surpluses are tighter. As [advances|e] and [buildings|e] expand production capacity, the impact of individual harvest years diminishes. This Situation can be disabled via the game rule \"Prosper or Perish: Variable Harvests\" when creating a new game."
harvest_situation_monthly: "• Each September, harvests are rolled for every [region|e] in [ShowContinentName('europe')]\n• Modifiers last one year and affect local food-producing [rgo|e] output\n• Poor harvests can cause [starving|e]; bountiful harvests ease food pressure"
game_concept_abysmal_harvest: "Failed Harvest"
game_concept_abysmal_harvest_desc: "A disastrous harvest that severely reduces food production.\n\n[ShowModifierEffect('abysmal_harvest_modifier')]"
game_concept_very_poor_harvest: "Bad Harvest"
game_concept_very_poor_harvest_desc: "A poor harvest that significantly reduces food production.\n\n[ShowModifierEffect('very_poor_harvest_modifier')]"
game_concept_poor_harvest: "Weak Harvest"
game_concept_poor_harvest_desc: "A below-average harvest that reduces food production.\n\n[ShowModifierEffect('poor_harvest_modifier')]"
game_concept_good_harvest: "Strong Harvest"
game_concept_good_harvest_desc: "An above-average harvest that boosts food production.\n\n[ShowModifierEffect('good_harvest_modifier')]"
game_concept_very_good_harvest: "Excellent Harvest"
game_concept_very_good_harvest_desc: "An excellent harvest that significantly boosts food production.\n\n[ShowModifierEffect('very_good_harvest_modifier')]"
game_concept_bountiful_harvest: "Exceptional Harvest"
game_concept_bountiful_harvest_desc: "An exceptional harvest that greatly boosts food production.\n\n[ShowModifierEffect('bountiful_harvest_modifier')]"
LEGEND_KEY_ABYSMAL_HARVEST: "[abysmal_harvest|e]"
LEGEND_KEY_VERY_POOR_HARVEST: "[very_poor_harvest|e]"
LEGEND_KEY_POOR_HARVEST: "[poor_harvest|e]"
LEGEND_KEY_GOOD_HARVEST: "[good_harvest|e]"
LEGEND_KEY_VERY_GOOD_HARVEST: "[very_good_harvest|e]"
LEGEND_KEY_BOUNTIFUL_GOOD_HARVEST: "[bountiful_harvest|e]"
# Game concepts for Prosper or Perish feature landing page
game_concept_pp_game_rules: "Game Rules"
game_concept_pp_game_rules_desc: "Prosper or Perish adds two optional game rules: Variable Harvest (can be turned off) and Harder AI (reduces food consumption for AI-controlled [pops|e])."
game_concept_pp_victuals: "Victuals"
game_concept_pp_victuals_desc: "A new [goods|e] type introduced by Prosper or Perish: rations for military and civilians. Produced by [pp_cookery|e] [buildings|e]."
game_concept_pp_cookery: "Cookery"
game_concept_pp_cookery_desc: "An urban [building|e] that produces Victuals (rations) for consumption."
game_concept_pp_population_distribution: "Population Distribution"
game_concept_pp_population_distribution_desc: "Prosper or Perish adjusts incentives for [ShowPopTypeName('burghers')], [ShowPopTypeName('peasants')], [ShowPopTypeName('soldiers')], Laborers, and other pop types."
game_concept_pp_population_growth: "Population Growth & Food"
game_concept_pp_population_growth_desc: "Population growth is driven by [food|e] availability. Consumption differs between rural and urban [pops|e]."
game_concept_pp_population_capacity: "Population Capacity"
game_concept_pp_population_capacity_desc: "Dynamic housing limits population capacity. When capacity is exceeded, [pops|e] may migrate or demote."
game_concept_pp_infrastructure: "Infrastructure"
game_concept_pp_infrastructure_desc: "Prosper or Perish ties infrastructure to roads and property prices, affecting how [locations|e] develop."
game_concept_pp_food_storage: "Food Storage"
game_concept_pp_food_storage_desc: "Storage mechanics for [food|e] determine how sieges and shortages play out. Empty storages lead to emigration, demotion, and death."
game_concept_pp_starvation: "Starvation"
game_concept_pp_starvation_desc: "Enhanced starvation effects when [markets|e] run empty. Affects [pops|e] during sieges and food crises."
game_concept_pp_ai_changes: "AI Changes"
game_concept_pp_ai_changes_desc: "The AI prioritizes urbanization and [food|e] management. Optional game rules can adjust AI behavior."
ENCYCLOPEDIA_PAGE_PROSPER_OR_PERISH: "Prosper or Perish"
ENCYCLOPEDIA_PAGE_PROSPER_OR_PERISH_DESC: "Prosper or Perish disentangles population growth from prosperity and development, making [food|e] the primary driver of growth and migration. Rural [locations|e] produce; urban centers consume. Full [markets|e] mean growth; empty storages mean emigration, demotion, and death.\n\n#T Table of Contents:#!\n$BULLET$ [pp_game_rules|e] — Turn off Variable Harvest, adjust AI buffs\n$BULLET$ [pp_victuals|e] — New trade good (rations) for military and civilians\n$BULLET$ [pp_cookery|e] — Urban building that produces Victuals\n$BULLET$ [harvest_situation|e] — Yearly harvest variance by region\n$BULLET$ [pp_population_distribution|e] — Pop-type incentives (Burghers, Peasants, etc.)\n$BULLET$ [pp_population_growth|e] — Food-driven growth and consumption\n$BULLET$ [pp_population_capacity|e] — Dynamic housing and migration\n$BULLET$ [pp_infrastructure|e] — Roads, property prices\n$BULLET$ [pp_food_storage|e] — Storage mechanics and sieges\n$BULLET$ [pp_starvation|e] — Enhanced starvation effects\n$BULLET$ [pp_ai_changes|e] — AI urbanization and food behavior"
