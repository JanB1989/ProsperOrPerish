# Game concepts for Prosper or Perish feature landing page
game_concept_pp_game_rules: "Prosper or Perish: Game Rules"
game_concept_pp_game_rules_desc: "Prosper or Perish adds two optional game rules: Variable Harvests (can be turned off) and Harder AI (reduces food consumption for AI-controlled [pops|e])."
game_concept_pp_victuals: "Prosper or Perish: New Trade Goods"
game_concept_pp_victuals_desc: "A new [goods|e] type introduced by Prosper or Perish: rations for military and civilians. Produced by [pp_cookery|e] [buildings|e]."
game_concept_pp_cookery: "Prosper or Perish: New Buildings"
game_concept_pp_cookery_desc: "An urban [building|e] that produces Victuals (rations) for consumption."
game_concept_pp_population_distribution: "Prosper or Perish: Population Distribution"
game_concept_pp_population_distribution_desc: "Prosper or Perish adjusts incentives for [ShowPopTypeName('burghers')], [ShowPopTypeName('peasants')], [ShowPopTypeName('soldiers')], Laborers, and other pop types."
game_concept_pp_food: "Prosper or Perish: Food Production"
game_concept_pp_food_desc: "#T Vanilla Problems:#!\nVanilla Europa Universalis 5 has many issues with its food system:\n\n$BULLET$ Food is almost never an issue.\n$BULLET$ Food goods are always raw; a single unit can be worth more depending on the location's food productivity modifier—creating massive surpluses of food goods while the [market|e] has no [food|e].\n$BULLET$ Food is too labour-unintensive and easy to produce.\n$BULLET$ No meaningful difference between producing food goods other than the food value they have.\n$BULLET$ How [food|e] modifiers and actual good modifiers stack is unintuitive at best and very bugged at worst.\n\n\n#T This System:#!\nBased on these limitations and bugs, this mod introduces a different approach:\n\n$BULLET$ #Y No trade good has food value in itself.#!\n$BULLET$ Nearly all food productivity modifiers (except flavour ones) have been reworked to specific modifiers for farmed [goods|e] or #Y Victuals#!. See [pp_farm_output|e].\n\n\n#T Food Production:#!\n[food|e] can now only be produced in two ways:\n\n$BULLET$ #Y Peasants#! directly produce it to feed themselves through #Y subsistence farming#!.\n$BULLET$ #Y Victual Markets#! (Food Markets, see New Buildings) use the new trade good #Y Victuals#! (see New Trade Goods) at a rate of #Y 1 Victual to 60 food#!.\n\n\nThink of these markets as places where your population sells and buys different forms of regional foods and preserved rations. Your estates partly pay for their maintenance.\n\n\n#T How It Works:#!\n\n$BULLET$ Trade [goods|e] like [ShowGoodsName('wheat')], [ShowGoodsName('wine')], [ShowGoodsName('fish')] and others are produced regionally and depend on [advances|e], weather, and more. See [pp_farm_output|e]. This creates swingy prices.\n$BULLET$ These goods are used in the #Y Cookery#! (see New Buildings) to produce #Y Victuals#!. The Cookery has complex recipes and enhancements. Victual prices rise and fall depending on input costs and [market|e] demand.\n$BULLET$ #Y Victuals#! are used to feed your local population through #Y Food markets#!, to import or export between regions, and to feed your standing armies and navies. Sailor and manpower [buildings|e] require large amounts for campaigns and voyages.\n\n\nThe Victual base price and conversion rate match vanilla defaults. The AI handles these changes well and understands that it needs to build Victual markets to avoid [starving|e].\n#T"
game_concept_pp_population_growth: "Prosper or Perish: Population Growth & Food"
game_concept_pp_population_growth_desc: "Population growth is driven by [food|e] availability. Consumption differs between rural and urban [pops|e].\n\n#T Local [food|e] Price Effects:#!\nEach [location|e] receives modifiers based on its [market|e]'s [food|e] price relative to the baseline:\n\n$BULLET$ Cheap [food|e] here - When [food|e] is below the baseline price: boosts [population_growth|e], [prosperity|e], devastation recovery, and pop [food|e] consumption.\n$BULLET$ Expensive [food|e] here - When [food|e] is above the baseline price: reduces [population_growth|e] and [prosperity|e], increases pop demotion speed, and lowers [food|e] consumption by [pops|e].\n\nThese effects are scaled by how far the local [food|e] price deviates from the baseline. Their impact is reflected in the [location|e]'s [population_growth|e] and [prosperity|e] values."
game_concept_pp_population_capacity: "Prosper or Perish: Population Capacity"
game_concept_pp_population_capacity_desc: "Dynamic housing limits population capacity. When capacity is exceeded, [pops|e] may migrate or demote."
game_concept_pp_infrastructure: "Prosper or Perish: Infrastructure"
game_concept_pp_infrastructure_desc: "Prosper or Perish ties infrastructure to roads and property prices, affecting how [locations|e] develop."
game_concept_pp_food_storage: "Prosper or Perish: Food Storage"
game_concept_pp_food_storage_desc: "Storage mechanics for [food|e] determine how sieges and shortages play out. Empty storages lead to emigration, demotion, and death."
game_concept_pp_starvation: "Prosper or Perish: Starvation"
game_concept_pp_starvation_desc: "Enhanced starvation effects when [markets|e] run empty. Affects [pops|e] during sieges and food crises."
game_concept_pp_ai_changes: "Prosper or Perish: AI Changes"
game_concept_pp_ai_changes_desc: "The AI prioritizes urbanization and [food|e] management. Optional game rules can adjust AI behavior."
game_concept_pp_urbanization: "Prosper or Perish: Urbanization"
game_concept_pp_urbanization_desc: "Over Europa Universalis 5's timeframe, large parts of the rural population moved to cities. This was driven by rising farm productivity: as farms produced more with fewer hands, fewer people were needed in the countryside to feed everyone. You will naturally urbanize more over time as advances and investments raise farm output.\n\nEach location represents a large area of land—many villages, some towns, and often cities. Building more in a location reduces its capacity for farms and farm-related buildings. It does not reduce the output of existing farms; it simply limits how many you can build.\n\n#T Affected buildings:#!\nThese rural buildings are affected by urbanization:\n\n$BULLET$ Farming Village\n$BULLET$ Forest Village\n$BULLET$ Fruit Orchard\n$BULLET$ Sheep Farms"
game_concept_pp_farm_capacity: "Prosper or Perish: Farm Capacity"
game_concept_pp_farm_capacity_desc: "In vanilla Europa Universalis 5 you can build roughly the same number of farming buildings everywhere. That is not historically accurate. Does it make sense to be able to build the same quantity of fruit orchards in an Arctic Grassland location as in a farmland province with a river in Spain?\n\nFarm Capacity is about the quantity of farms you can build, not their productivity. For farming output, see Farm Output.\n\n#T Affected buildings:#!\nTo fix this, maximum building capacity for:\n\n$BULLET$ Farming Village\n$BULLET$ Fishing Village\n$BULLET$ Forest Village\n$BULLET$ Fruit Orchard\n$BULLET$ Sheep Farms\n\nis split into two parts.\n\n#T Component one:#!\nChanges over the game. Any of these can be beneficial or detrimental to capacity:\n\n$BULLET$ Population\n$BULLET$ Development\n$BULLET$ Advances\n$BULLET$ Urbanization\n$BULLET$ [ShowBuildingTypeName('irrigation_systems')|e]\n\n#T Component two:#!\nFixed and never changes. These too can be beneficial or detrimental depending on the location:\n\n$BULLET$ Vegetation\n$BULLET$ Topography\n$BULLET$ Climate\n$BULLET$ Access to fresh water\n$BULLET$ Coastal status\n$BULLET$ The location's RGO\n\n#T Map modes:#!\nThe new map modes under Geography show these inert adjustments. Use them to see the natural potential for each building type in any location."
game_concept_pp_farm_output: "Prosper or Perish: Farm Output"
game_concept_pp_farm_output_desc: "This entry is about how much each farm produces—its productivity—not how many you can build. For farm quantity, see Farm Capacity.\n\nOver Europa Universalis 5's timeframe, farm productivity rose sharply. The mod reflects this by replacing vanilla's flat food modifier with per-good output modifiers. Each type of food can now gain or lose output independently.\n\nFarm output is affected by both inert and dynamic factors. Any of these can be beneficial or detrimental.\n\n#T Component one:#!\nDynamic factors that change over the game. Some regions or countries may gain access to productivity improvements earlier or later than others:\n\n$BULLET$ Advances\n$BULLET$ Societal choices\n$BULLET$ Development\n$BULLET$ Government reforms\n$BULLET$ [ShowBuildingTypeName('irrigation_systems')|e]\n\n#T Component two:#!\nInert factors tied to geography and location. These can boost or reduce output depending on the place:\n\n$BULLET$ Vegetation\n$BULLET$ Topography\n$BULLET$ Climate\n$BULLET$ Access to fresh water\n$BULLET$ Coastal status\n$BULLET$ The location's RGO\n\n#T Harvest:#!\nYearly harvest outcomes vary by region and can further boost or reduce farm output beyond the factors above. For full details on harvest levels and how they affect food production, see Variable Harvests."
