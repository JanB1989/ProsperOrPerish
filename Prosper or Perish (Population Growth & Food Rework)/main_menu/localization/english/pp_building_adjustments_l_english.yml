  MAPMODE_PP_FRUIT_ORCHARD_CAPACITY_TT_LAND: "#T $mapmode_pp_fruit_orchard_capacity_name$#!\nNatural Potential: #V [Location.MakeScope.GetVariable('pp_fruit_orchard_fixed_env_bonus').GetValue|0]#!\n\n[Location.GetClimate.GetIcon] #H Climate:#! [Location.GetClimate.GetNameNoUnderline]\n#I +5 Medit, +3 Subtrop, +2 Oceanic, +1 Contin#!\n[Location.GetTopography.GetIcon] #H Topography:#! [Location.GetTopography.GetNameNoUnderline]\n#I +2 Flatland, +1 Hills, +1 Plateau#!\n[Location.GetVegetation.GetIcon] #H Vegetation:#! [Location.GetVegetation.GetNameNoUnderline]\n#I +3 Farmland, +2 Grassland, +1 Woods#!\n#H Water Access#!\n#I +1 River, Lake, or Coastal#!\n[Location.GetRawMaterial.GetIcon] #H Raw Good:#! [Location.GetRawMaterial.GetName]\n#I +10 Fruit Match#!$PP_DYNAMIC_FACTORS_FOOTER$"
